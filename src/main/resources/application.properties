spring.application.name=gong-entrypoints

# Surface the downstream-error detail (status + body / "service unreachable") in error responses.
# Without this, Spring hides the message and troubleshooter failures show only "Bad Gateway".
server.error.include-message=always

# Telephony Systems troubleshooter target. Defaults to the local Supervisor
# (gong-module-run ... gong-telephony-systems). Switch envs with: --spring.profiles.active=remote
telephony.base-url=http://localhost:8097

# gong-data-capture troubleshooter targets.
# RecordingConsentApiServer (DCP endpoints) — run via gong-module-run in Docker.
# Container's HTTP port (8080) is published on host 7254 (docker ps: 0.0.0.0:7254->8080/tcp).
datacapture.api-server-url=http://localhost:7254
# RecordingConsentTasks (features, settings, Redis, consent email) — run via gong-module-run in
# Docker; the container publishes its port to the host (8111 here). Check the module's mapped port
# if it differs.
datacapture.tasks-url=http://localhost:8111

# CallScheduler troubleshooter target. Defaults to the local CallScheduler
# (IntelliJ "CallScheduler" run config, port 8091).
callschedulers.base-url=http://localhost:8091
